      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-500:   #6b7280;
      --gray-600:   #4b5563;
      --gray-900:   #111827;

    html, body {

      z-index: -1;
      pointer-events: none;
      opacity: 0.04;
      image-rendering: pixelated;
      filter: invert(1);
      mix-blend-mode: multiply;
    }

    /* ── NAVBAR ── */
    #navbar {

      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);

    .nav-inner {

      margin: 0 auto;
      padding: 0 1.5rem;
      height: 4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;

    .brand {

      font-weight: 700;
      font-size: 1.1rem;
      color: var(--gray-900);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--teal);
      display: inline-block;
    }

    #count-badge {
      font-size: .8rem;
      font-weight: 600;
      color: var(--gray-500);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── HERO ── */

      margin: 0 auto;
      padding: 4rem 1.5rem 2rem;

      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: .5rem;
    }

    .hero h1 span { color: var(--teal); }

    .hero p {
      color: var(--gray-500);
      font-size: .95rem;
      margin-top: .4rem;

    /* ── CONTROLS ── */
    .controls {
      max-width: 72rem;
      margin: 0 auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .ctrl-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .7rem;
      font-weight: 700;
      color: var(--gray-900);
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none;
    }

    input[type="search"],
    select {
      width: 100%;
      padding: .7rem 1rem .7rem 2.5rem;
      border: 2px solid var(--gray-900);
      border-radius: .75rem;
      font-family: 'Noto Sans', sans-serif;
      font-size: .875rem;
      background: var(--white);
      color: var(--gray-900);
      outline: none;
      transition: border-color .2s, box-shadow .2s;

      padding-left: 2.5rem;

      background-position: right 12px center;
      padding-right: 2rem;
    }

    input[type="search"]:focus,
    select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px var(--teal-light);
    }

    /* ── STATS ROW ── */
    .stats {

      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;

      font-weight: 700;
      font-size: 1.5rem;
      color: var(--gray-900);

    .stat-label {
      font-size: .75rem;
      color: var(--gray-500);
      margin-top: 2px;
    }

    .stat-divider {
      width: 1px;
      background: var(--gray-200);
      align-self: stretch;
    }

    /* ── GRID ── */

      max-width: 72rem;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD — matches portfolio testimonial-card exactly ── */
    .card {
      background: var(--white);
      border: 2px solid var(--gray-200);
      border-radius: 1rem;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: box-shadow .3s ease, transform .3s ease, border-color .3s ease;
      animation: fadeUp .4s ease both;
      cursor: default;
    }

    .card:hover {
      box-shadow: 0 20px 40px -12px var(--teal-light), 0 4px 16px rgba(0,0,0,.06);

      border-color: var(--gray-200);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }

    .stars {
      display: flex;

      font-size: 1.1rem;
      margin-bottom: 1rem;

    .star-filled { color: var(--star); }

    .review-text {
      color: var(--gray-600);
      font-size: .9rem;
      line-height: 1.7;

    }

    .reviewer-name {

      font-weight: 700;
      color: var(--gray-900);
      font-size: .95rem;

    .reviewer-sub {

      align-items: center;

      flex-wrap: wrap;

    .badge {

      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 2px 8px;
      border-radius: 20px;
      background: #fef9c3;
      color: #92400e;
    }

    .date-tag {
      font-size: .75rem;
      color: var(--gray-400);
      margin-top: 4px;
    }

    /* ── EMPTY STATE ── */
    #empty {
      display: none;
      text-align: center;
      padding: 5rem 1rem;
      color: var(--gray-400);
    }

    #empty h3 {
      font-size: 1.2rem;
      color: var(--gray-900);
      margin: 1rem 0 .5rem;
    }

    #empty p { font-size: .9rem; }

    /* ── DIVIDER ── */
    .section-divider {
      max-width: 72rem;
      margin: 0 auto;
      padding: 0 1.5rem;
      border: none;
      border-top: 1px solid var(--gray-200);
      margin-bottom: 1.5rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .controls, .grid-wrap, .hero, .stats { padding-left: 1rem; padding-right: 1rem; }
      #grid { grid-template-columns: 1fr; }
      .stats { gap: 1rem; }
      .stat-divider { display: none; }
    }
  </style>
</head>

viewer": "kznmktg", "rating": 5, "date": "2020-05-04", "country": "United States", "country_code": "US", "price_range": "", "gig": "create-your-8bit-theme-intro", "repeat_buyer": false, "review": "Phenomenal!"}, {"reviewer": "valaisactif", "rating": 5, "date": "2020-04-20", "country": "Switzerland", "country_code": "CH", "price_range": "", "gig": "create-your-8bit-theme-intro", "repeat_buyer": false, "review": "I like his job, I recommand, thanks !"}];

  const grid     = document.getElementById('grid');
  const empty    = document.getElementById('empty');
  const countEl  = document.getElementById('count-badge');
  const statsRow = document.getElementById('stats-row');

  // ── Populate country filter ──
  const countries = [...new Set(ALL.map(r => r.country).filter(Boolean))].sort();
  const cSelect = document.getElementById('filter-country');
  countries.forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    cSelect.appendChild(o);
  });

  // ── Stats ──
  const total    = ALL.length;
  const avgRat   = (ALL.reduce((s,r) => s + (parseFloat(r.rating)||0), 0) / total).toFixed(1);
  const countries5 = new Set(ALL.map(r=>r.country).filter(Boolean)).size;
  const repeats  = ALL.filter(r => r.repeat_buyer).length;

  statsRow.innerHTML = [
    [total,      'Total Reviews'],
    [avgRat + ' ★', 'Avg Rating'],
    [countries5, 'Countries'],
    // [repeats,    'Repeat Buyers'],
  ].map((s,i) => `
    ${i>0 ? '<div class="stat-divider"></div>' : ''}
    <div class="stat">
      <span class="stat-num">${s[0]}</span>
      <span class="stat-label">${s[1]}</span>
    </div>
  `).join('');

  // ── Helpers ──
  function stars(n) {
    n = parseInt(n) || 0;
    return Array.from({length:5}, (_,i) =>
      `<span class="${i<n?'star-filled':'star-empty'}">★</span>`
    ).join('');
  }

  function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    return isNaN(dt) ? d : dt.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  }

  function renderCard(r, i) {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.animationDelay = `${(i % 12) * 45}ms`;

    const text = r.review || r.text || '';
    const sub  = [r.country, r.price_range].filter(Boolean).join(' · ');

    div.innerHTML = `
      <div>
        <div class="stars">${stars(r.rating)}</div>
        <p class="review-text">"${text}"</p>
      </div>
      <div class="card-footer">
        <div class="reviewer-name">${r.reviewer || 'Anonymous'}</div>
        <div class="reviewer-sub">
          ${sub}
          ${r.repeat_buyer ? '<span class="badge">Repeat buyer</span>' : ''}
        </div>
        <div class="date-tag">${fmtDate(r.date)}</div>
      </div>
    `;
    return div;
  }

  function render() {
    const q  = document.getElementById('search').value.toLowerCase();
    const so = document.getElementById('sort').value;
    const ra = document.getElementById('filter-rating').value;
    const co = document.getElementById('filter-country').value;

    let data = ALL.filter(r => {
      const txt = (r.review||r.text||'').toLowerCase();
      const nm  = (r.reviewer||'').toLowerCase();
      if (q && !txt.includes(q) && !nm.includes(q)) return false;
      if (ra && String(r.rating) !== ra) return false;
      if (co && r.country !== co) return false;
      return true;
    });

    data.sort((a,b) => {
      if (so==='date-desc')     return new Date(b.date)-new Date(a.date);
      if (so==='date-asc')      return new Date(a.date)-new Date(b.date);
      if (so==='rating-desc')   return (b.rating||0)-(a.rating||0);
      if (so==='rating-asc')    return (a.rating||0)-(b.rating||0);
      if (so==='reviewer-asc')  return (a.reviewer||'').localeCompare(b.reviewer||'');
      return 0;
    });

    grid.innerHTML = '';
    if (!data.length) {
      empty.style.display = 'block';
      countEl.textContent = 'No results';
    } else {
      empty.style.display = 'none';
      data.forEach((r,i) => grid.appendChild(renderCard(r,i)));
      countEl.textContent = `${data.length} review${data.length!==1?'s':''}`;
    }
  }

  ['search','sort','filter-rating','filter-country'].forEach(id =>
    document.getElementById(id).addEventListener(id==='search'?'input':'change', render)
  );

  render();
</script>
